<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Japanese - Interactive Greet</title>
    <meta name="description" content="A premium interactive Japanese learning experience.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <main id="app">
        <div class="container">
            <div id="game-container" class="glass">
                <nav class="app-nav">
                    <div class="brand">
                        <h2>Learn <span class="accent">Japanese</span></h2>
                    </div>
                    <div class="mode-switcher">
                        <div class="switch-container">
                            <button id="show-scenarios" class="switch-btn active">Scenarios</button>
                            <button id="show-flashcards" class="switch-btn">Flashcards</button>
                            <button id="show-quiz" class="switch-btn">Quiz</button>
                        </div>
                    </div>
                </nav>

                <!-- Home View -->
                <div id="home-view">
                    <header class="view-header">
                        <p class="subtitle">Select a scenario to begin your journey</p>
                    </header>
                    <div id="scenario-grid" class="scenario-grid">
                        <!-- Scenarios will be injected here -->
                    </div>
                </div>

                <!-- Lesson View -->
                <div id="lesson-view" class="hidden">
                    <div id="lesson-header">
                        <button id="exit-lesson" class="text-link">← Back to Scenarios</button>
                        <div id="progress-container">
                            <div id="progress-bar"></div>
                        </div>
                        <div class="scenario-settings">
                            <label class="toggle-switch">
                                <input type="checkbox" id="scenario-autoplay-toggle" checked>
                                <span class="slider"></span>
                                <span class="label-text">Auto-play audio</span>
                            </label>
                        </div>
                    </div>

                    <div id="character-stage">
                        <div id="char-left" class="character">
                            <div class="char-label">Yuki</div>
                            <img src="yuki.png" alt="Yuki" id="yuki-img">
                            <div class="speech-bubble" id="bubble-yuki">
                                <button class="bubble-audio-btn" title="Hear Pronunciation">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M11 5L6 9H2v6h4l5 4V5z"></path>
                                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                                    </svg>
                                </button>
                                <p class="jp-text"></p>
                                <p class="en-text"></p>
                            </div>
                        </div>
                        <div id="char-right" class="character">
                            <div class="char-label">Kenji</div>
                            <img src="kenji.png" alt="Kenji" id="kenji-img">
                            <div class="speech-bubble" id="bubble-kenji">
                                <button class="bubble-audio-btn" title="Hear Pronunciation">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M11 5L6 9H2v6h4l5 4V5z"></path>
                                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                                    </svg>
                                </button>
                                <p class="jp-text"></p>
                                <p class="en-text"></p>
                            </div>
                        </div>
                    </div>

                    <div id="test-phase" class="hidden">
                        <p id="test-prompt">Ready?</p>
                        <div class="input-group">
                            <input type="text" id="user-input" placeholder="Type in Romaji..." autocomplete="off">
                            <button id="submit-btn" class="glow-button">Check</button>
                        </div>
                        <div id="feedback" class="feedback"></div>
                    </div>

                    <div id="controls">
                        <div class="nav-btns">
                            <button id="back-btn" class="glow-button hidden">Back</button>
                            <button id="next-btn" class="glow-button hidden">Next Topic</button>
                        </div>
                        <button id="restart-btn" class="small-btn hidden">Restart Lesson</button>
                    </div>
                </div>

                <!-- Flashcard View -->
                <div id="flashcard-view" class="hidden">
                    <header class="view-header">
                        <h2>Flashcard <span class="accent">Mode</span></h2>
                        <p class="subtitle">Type the English translation for the Japanese word</p>
                        <div class="flash-settings">
                            <label class="toggle-switch">
                                <input type="checkbox" id="flash-autoplay-toggle" checked>
                                <span class="slider"></span>
                                <span class="label-text">Auto-play audio</span>
                            </label>
                        </div>
                    </header>

                    <div class="flashcard-container">
                        <div id="flashcard" class="flashcard">
                            <div class="card-inner">
                                <div class="card-front">
                                    <div class="flash-score-badge" id="flash-score">0/0</div>
                                    <button id="flash-audio-btn" class="flash-audio-btn" title="Hear Pronunciation">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                                            stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                            stroke-linejoin="round">
                                            <path d="M11 5L6 9H2v6h4l5 4V5z"></path>
                                            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07">
                                            </path>
                                        </svg>
                                    </button>
                                    <span id="flash-jp-text">...</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="input-group">
                        <input type="text" id="flash-user-input" placeholder="English translation..."
                            autocomplete="off">
                        <button id="flash-submit-btn" class="glow-button">Check</button>
                    </div>

                    <div id="flash-feedback" class="feedback"></div>

                    <div class="deck-stats">
                        <p>Words in deck: <span id="deck-count">0</span></p>
                    </div>
                </div>

                <!-- Quiz View -->
                <div id="quiz-view" class="hidden">
                    <header class="view-header">
                        <h2>Japanese <span class="accent">Quiz</span></h2>
                        <p class="subtitle">Fill in the blank with the correct word</p>
                    </header>

                    <div class="quiz-container">
                        <div class="quiz-question glass">
                            <div class="quiz-sentence" id="quiz-sentence-jp">___</div>
                            <div class="quiz-translation" id="quiz-sentence-en">Translation</div>
                        </div>

                        <div class="quiz-options" id="quiz-options">
                            <!-- Options will be injected here -->
                        </div>
                    </div>

                    <div id="quiz-feedback" class="feedback"></div>

                    <div class="quiz-progress-wrapper">
                        <div id="quiz-progress-container" class="progress-container">
                            <div id="quiz-progress-bar" class="progress-bar"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="app.js"></script>
</body>

</html>
